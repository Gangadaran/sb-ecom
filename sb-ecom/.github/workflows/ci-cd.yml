name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # 👈 allows manual run from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- BACKEND ----------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Backend
        run: mvn clean package -DskipTests

      # ---------------- FRONTEND ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build Frontend
        run: |
          cd ecom-frontend
          npm install
          npm run build

      # ---------------- DOCKER ----------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sb-ecom-backend:latest .

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sb-ecom-frontend:latest ./ecom-frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sb-ecom-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sb-ecom-frontend:latest